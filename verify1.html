<!DOCTYPE html>
<html>
<head>
  <title>Pay 0.01 USDC</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
  <h2>Pay 0.01 USDC to Qarnux</h2>
  <button onclick="signPermit()">Connect & Sign Permit</button>
  <pre id="output"></pre>

  <script>
    const usdcAddress = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
    const spender = "0x2C5aF337b35F0B2589DcA8c50fB8f65803f0A94D";
    const amount = "10000"; // 0.01 USDC (6 decimals)
    const deadline = Math.floor(Date.now() / 1000) + 3 * 60 * 60; // 3 hours from now

    const usdcAbi = [
      "function nonces(address owner) view returns (uint256)",
      "function DOMAIN_SEPARATOR() view returns (bytes32)"
    ];

    async function signPermit() {
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      const signer = provider.getSigner();
      const owner = await signer.getAddress();
      const usdc = new ethers.Contract(usdcAddress, usdcAbi, provider);
      const nonce = await usdc.nonces(owner);
      const domainSeparator = await usdc.DOMAIN_SEPARATOR();

      const permitData = {
        owner,
        spender,
        value: amount,
        nonce: nonce.toString(),
        deadline
      };

      const domain = {
        name: "USD Coin",
        version: "2",
        chainId: 8453, // Base Mainnet
        verifyingContract: usdcAddress
      };

      const types = {
        Permit: [
          { name: "owner", type: "address" },
          { name: "spender", type: "address" },
          { name: "value", type: "uint256" },
          { name: "nonce", type: "uint256" },
          { name: "deadline", type: "uint256" }
        ]
      };

      const signature = await signer._signTypedData(domain, types, permitData);
      const sig = ethers.utils.splitSignature(signature);

      document.getElementById("output").textContent = JSON.stringify({
        owner,
        spender,
        value: amount,
        deadline,
        nonce: nonce.toString(),
        v: sig.v,
        r: sig.r,
        s: sig.s
      }, null, 2);
    }
  </script>
</body>
</html>
